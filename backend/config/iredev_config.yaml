# =============================================================================
# iredev_config.yaml  –  iReDev Framework configuration
#
# PURPOSE: Framework-level settings — commit this file to version control.
#          It defines agent behaviour, knowledge-base topology, review gates,
#          and artifact storage.  It does NOT contain secrets or provider
#          choices; those live in agent_config.yaml (user-managed, gitignored).
#
# Secrets (API keys, connection strings) are NOT stored here.
# Set them in your .env file (see .env.example).
# Every ${VAR} placeholder is expanded at load time via os.path.expandvars().
# =============================================================================

# ---------------------------------------------------------------------------
# iReDev-specific settings
# ---------------------------------------------------------------------------
iredev:

  # ── Agent configurations ──────────────────────────────────────────────────
  agents:
    visionary:
      memory_type: "short_term"
      max_react_iterations: 10

    agenda:
      memory_type: "short_term"
      max_react_iterations: 10

    interviewer:
      # Buffer for the current ReAct turn + episodic store keyed by perspective.
      # Episodes (trigger / decision / outcome) recorded when an item closes are
      # read by both interviewer and enduser on later items with the same role
      # so the same lived ground is not probed twice.
      memory_type: "short_term_episodic"
      max_react_iterations: 10
      custom_params:
        # Operational budget for per-scene drilling. min sets the floor
        # before saturation-close is allowed; max is the hard ceiling.
        # min=2 lets the interviewer close early once evidence has
        # saturated (avoids the rephrase loop seen when min was higher
        # than the dialogue could legitimately fill); max=10 keeps room
        # for deep drills when the role keeps surfacing new lived
        # detail. Both are budgets, not targets — the interviewer's
        # evidence-saturation principle decides when to actually close.
        min_turns_per_assumption_item: 2
        max_turns_per_item: 10

    enduser:
      memory_type: "short_term_episodic"
      max_react_iterations: 10

    distiller:
      memory_type: "short_term"
      max_react_iterations: 10
      custom_params:
        # Max concurrent Pass 1 LLM calls. Pass 1 is now batched by
        # perspective (typically 5 batches × ~14K input tokens each), so
        # running them in parallel produces a large concurrent token burst
        # that low-tier OpenAI accounts reject with 429 (per-second TPM
        # window or concurrent-request cap, depending on tier).
        # Sequential = 5 calls × ~5-10s ≈ 30-50s total, no burst, safe
        # across every tier. Raise to 2 only when the provider tier is
        # known to absorb the burst (Tier 2+ for gpt-5.4-mini family).
        max_parallel: 1
        # Retry budget for transient rate-limit (429) responses across all
        # synthesis-phase calls. Exponential backoff: 5s, 15s, 45s.
        rate_limit_retries: 3
        rate_limit_base_delay: 5.0

    sprint_agent:
      memory_type: "short_term"
      max_react_iterations: 10
      custom_params:
        # Retry budget for transient rate-limit (429) responses on
        # structured calls. Exponential backoff: 5s, 15s, 45s.
        rate_limit_retries: 3
        rate_limit_base_delay: 5.0

    analyst:
      memory_type: "short_term"
      max_react_iterations: 10
      custom_params:
        rate_limit_retries: 3
        rate_limit_base_delay: 5.0

    reviewer:
      memory_type: "short_term"
      max_react_iterations: 10

  # ── Knowledge base ────────────────────────────────────────────────────────
  knowledge_base:
    base_path: "knowledge"
    domain_knowledge_path: "knowledge/domains"
    methodology_path: "knowledge/methodologies"
    standards_path: "knowledge/standards"
    templates_path: "knowledge/templates"
    strategies_path: "knowledge/strategies"
    cache_enabled: true
    auto_reload: true
    version_control: true
    backup_enabled: true

    # PostgreSQL / pgvector – connection string comes from .env
    pg_connection: ${IREDEV_PG_CONNECTION}

    # pgvector collection name
    collection_name: "iredev_knowledge"

    # Text splitting
    chunk_size: 800
    chunk_overlap: 100

    # ── Embedding options ─────────────────────────────────────────────────
    #
    # Option A: Local Ollama (default — no cloud key required)
    embedding:
      type: "openai"               # OpenAI-compatible protocol
      model: "nomic-embed-text"    # default local Ollama model
      api_key: "EMPTY"             # Ollama ignores the key
      base_url: ${OLLAMA_BASE_URL} # e.g. http://localhost:11434/v1
      dims: 768

    # Option B: OpenAI API
    # embedding:
    #   type: "openai"
    #   model: "text-embedding-3-small"
    #   api_key: ${OPENAI_API_KEY}
    #   base_url: ${OPENAI_BASE_URL}
    #   dims: 768

    # Option C: Google Gemini
    # embedding:
    #   type: "google"
    #   model: "gemini-embedding-001"
    #   api_key: ${GEMINI_API_KEY}
    #   dims: 768

