# =============================================================================
# agent_config.yaml  –  Deployment / environment configuration
#
# PURPOSE: User-managed overrides — keep this file gitignored (or in a
#          separate secrets store).  It controls which LLM provider and model
#          to use, API tier limits, flow tuning, and optional web-search.
#          Framework behaviour (agents, knowledge base, …) lives in
#          iredev_config.yaml and should not be edited here.
#
# Secrets (API keys, connection strings) are NOT stored here.
# Set them in your .env file (see .env.example).
# Every ${VAR} placeholder is expanded at load time via os.path.expandvars().
# =============================================================================

# ---------------------------------------------------------------------------
# LLM provider profiles
# llm.default is used by all agents unless routed to another profile.
# llm.interview is routed to interviewer/enduser below to reduce interview cost.
# ---------------------------------------------------------------------------
llm:

  # ── Default profile: all agents except explicit overrides ───────────────
  default:
    type: "openai"
    api_key: ${OPENAI_API_KEY}
    model: "gpt-5.4"
    base_url: ${OPENAI_BASE_URL}
    temperature: 0.7
    max_output_tokens: 4096
    max_input_tokens: 100000

  # ── Interview profile: cheaper dialogue loop for elicitation ────────────
  # Inherits provider/API/base_url/token settings from llm.default unless
  # explicitly overridden here.
  interview:
#    model: "gpt-5.4-nano" # 20' 1m5 token 0.25$
#    model: "gemini-3.1-flash-lite"
    model: "gpt-4o-mini"
#    model: "gpt-4o-mini"
    temperature: 0.7
    max_output_tokens: 2048

  # ── Agent → profile routing ─────────────────────────────────────────────
  agents:
    interviewer: interview
    enduser: interview

  # Other providers can use the same shape:
  # default:
  #   type: "claude"
  #   api_key: ${ANTHROPIC_API_KEY}
  #   model: "claude-3-5-sonnet-latest"
  # interview:
  #   model: "claude-3-5-haiku-latest"

# ---------------------------------------------------------------------------
# Rate limits
# Adjust these to match your API subscription tier.
# Only the block matching the active llm.type above is used at runtime.
# ---------------------------------------------------------------------------
rate_limits:

  claude:
    requests_per_minute: 50
    input_tokens_per_minute: 20000
    output_tokens_per_minute: 8000
    input_token_price_per_million: 3.0
    output_token_price_per_million: 15.0

  openai:
    requests_per_minute: 500
    input_tokens_per_minute: 200000
    output_tokens_per_minute: 100000
    input_token_price_per_million: 0.15
    output_token_price_per_million: 0.60

  gemini:
    requests_per_minute: 60
    input_tokens_per_minute: 30000
    output_tokens_per_minute: 10000
    input_token_price_per_million: 0.125
    output_token_price_per_million: 0.375

  huggingface:
    requests_per_minute: 100
    input_tokens_per_minute: 100000
    output_tokens_per_minute: 50000
    input_token_price_per_million: 0.0
    output_token_price_per_million: 0.0
